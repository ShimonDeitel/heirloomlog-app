name: Heirloomlog
options:
  bundleIdPrefix: com.shimondeitel.heirloomlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Heirloomlog:
    type: application
    platform: iOS
    sources:
      - path: Heirloomlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.heirloomlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Heirloomlog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  HeirloomlogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HeirloomlogTests
      - path: Heirloomlog.storekit
    dependencies:
      - target: Heirloomlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.heirloomlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  HeirloomlogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HeirloomlogUITests
    dependencies:
      - target: Heirloomlog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.heirloomlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Heirloomlog:
    build:
      targets:
        Heirloomlog: all
        HeirloomlogTests: [test]
        HeirloomlogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Heirloomlog.storekit
    test:
      config: Debug
      storeKitConfiguration: Heirloomlog.storekit
      targets:
        - HeirloomlogTests
        - HeirloomlogUITests
    archive:
      config: Release
